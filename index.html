<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVANT Engenharia | Diagnóstica &amp; Mapeamento</title>
    <meta name="description"
        content="AVANT Engenharia Diagnóstica &amp; Mapeamento. Soluções de engenharia com precisão e tecnologia.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.avant.eng.br/">
    <meta name="theme-color" content="#09090B">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.avant.eng.br/">
    <meta property="og:title" content="AVANT Engenharia | Diagnóstica &amp; Mapeamento">
    <meta property="og:description"
        content="AVANT Engenharia Diagnóstica &amp; Mapeamento. Soluções de engenharia com precisão e tecnologia.">
    <meta property="og:site_name" content="AVANT Engenharia">

    <!-- Redirect to links page after 4 seconds -->
    <meta http-equiv="refresh" content="4;url=/links">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #09090B;
            color: #fafafa;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* Subtle radial glow */
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(120, 120, 140, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .brand {
            font-size: clamp(5rem, 18vw, 14rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #fafafa;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
        }

        .status {
            font-size: clamp(0.85rem, 2vw, 1.1rem);
            font-weight: 300;
            color: rgba(250, 250, 250, 0.4);
            letter-spacing: 0.15em;
            text-transform: lowercase;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s forwards;
        }

        .redirect-hint {
            font-size: 0.75rem;
            font-weight: 400;
            color: rgba(250, 250, 250, 0.15);
            margin-top: 3rem;
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.2s forwards;
        }

        .redirect-hint a {
            color: rgba(250, 250, 250, 0.3);
            text-decoration: none;
            border-bottom: 1px solid rgba(250, 250, 250, 0.15);
            transition: all 0.3s ease;
        }

        .redirect-hint a:hover {
            color: rgba(250, 250, 250, 0.6);
            border-bottom-color: rgba(250, 250, 250, 0.4);
        }

        /* Pulsing dot */
        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: rgba(250, 250, 250, 0.3);
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="glow"></div>

    <div class="container">
        <h1 class="brand">AVANT</h1>
        <p class="status"><span class="dot"></span>site em manutenção..</p>
        <p class="redirect-hint">redirecionando em instantes — <a href="/links">ir agora</a></p>
    </div>
</body>

</html>
